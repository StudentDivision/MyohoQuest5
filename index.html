<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="スマホ向け教学クイズRPG『ミョウホウ・クエスト』。相棒の若鷲・ソラとともに、教学という希望の武器で迷いを晴らす冒険へ。">
  <meta name="theme-color" content="#102a51">
  <meta name="format-detection" content="telephone=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ミョウホウ・クエスト">
  <title>ミョウホウ・クエスト</title>
  <style>
* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100%;
  overflow-x: hidden;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
  color: #f8fafc;
  background:
    radial-gradient(circle at top, rgba(255, 255, 255, 0.95) 0%, rgba(226, 243, 255, 0.85) 18%, transparent 42%),
    radial-gradient(circle at 15% 18%, rgba(255, 215, 126, 0.35) 0%, transparent 28%),
    radial-gradient(circle at 88% 8%, rgba(122, 211, 255, 0.35) 0%, transparent 26%),
    linear-gradient(160deg, #07172f 0%, #12325d 38%, #1d5d7a 68%, #2f7d57 100%);
}

body {
  display: flex;
  justify-content: center;
  align-items: stretch;
}

button,
input,
textarea,
select {
  font-family: inherit;
}

button {
  -webkit-tap-highlight-color: transparent;
}

#app {
  width: 100%;
  max-width: 430px;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  background:
    radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.55) 0%, rgba(255, 240, 181, 0.22) 20%, transparent 46%),
    radial-gradient(circle at 8% 18%, rgba(120, 202, 255, 0.32) 0%, transparent 26%),
    linear-gradient(180deg, #102a51 0%, #15416b 35%, #edf5ff 35.2%, #d9f0ff 50%, #90c987 100%);
  border-left: 4px solid #051126;
  border-right: 4px solid #051126;
  box-shadow:
    0 0 0 2px rgba(255, 214, 102, 0.32),
    0 0 44px rgba(0, 0, 0, 0.34);
}

#app::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 12% 12%, rgba(255,255,255,0.62) 0 2px, transparent 3px),
    radial-gradient(circle at 74% 9%, rgba(255,255,255,0.46) 0 2px, transparent 3px),
    radial-gradient(circle at 90% 30%, rgba(255,255,255,0.44) 0 1px, transparent 2px),
    radial-gradient(circle at 22% 42%, rgba(255,255,255,0.38) 0 1px, transparent 2px);
  opacity: 0.9;
}

.screen {
  width: 100%;
  min-height: 100vh;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  position: relative;
  z-index: 1;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  color: #fff8d6;
  background:
    linear-gradient(180deg, rgba(19, 45, 86, 0.98), rgba(5, 18, 42, 0.98));
  border: 2px solid #f4d06f;
  border-radius: 999px;
  padding: 8px 10px 8px 15px;
  box-shadow:
    0 5px 0 rgba(2, 8, 23, 0.45),
    0 13px 22px rgba(0, 0, 0, 0.2),
    inset 0 1px 0 rgba(255, 255, 255, 0.22);
}

.topbar strong {
  font-size: 14px;
  letter-spacing: 0.04em;
  text-shadow: 0 1px 0 #000;
}

.topbar button {
  width: auto;
  min-width: 64px;
  min-height: 34px;
  padding: 5px 10px;
  border-width: 2px;
  font-size: 12px;
  box-shadow: none;
}

.box {
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.97), rgba(241, 248, 255, 0.94));
  color: #102033;
  border: 3px solid #11294d;
  border-radius: 18px;
  padding: 14px;
  box-shadow:
    0 5px 0 rgba(5, 18, 42, 0.32),
    0 12px 24px rgba(0, 0, 0, 0.13),
    inset 0 1px 0 rgba(255, 255, 255, 0.95);
}

.command-window,
.message {
  background:
    linear-gradient(180deg, #10264d 0%, #071733 100%);
  color: #f8fbff;
  border: 3px solid #f4d06f;
  border-radius: 18px;
  padding: 13px;
  line-height: 1.58;
  box-shadow:
    0 5px 0 rgba(2, 8, 23, 0.55),
    0 14px 24px rgba(0, 0, 0, 0.22),
    inset 0 0 0 2px rgba(255, 255, 255, 0.08);
}

.message strong,
.command-window strong {
  color: #fff2a8;
}

.message .small,
.command-window .small {
  color: #dbeafe;
}

.title-box {
  margin-top: 28px;
  text-align: center;
  background:
    radial-gradient(circle at top, #ffffff 0%, #fff7c9 22%, #f4d06f 48%, #17345d 49%, #071733 100%);
  border: 4px solid #f4d06f;
  border-radius: 28px;
  padding: 26px 14px 24px;
  position: relative;
  overflow: hidden;
  box-shadow:
    0 7px 0 rgba(5, 18, 42, 0.55),
    0 18px 34px rgba(0, 0, 0, 0.24),
    inset 0 0 0 2px rgba(255, 255, 255, 0.16);
}

.title-box::before {
  content: "";
  position: absolute;
  inset: -60px;
  background:
    radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.95) 0 4px, transparent 5px),
    radial-gradient(circle at 82% 26%, rgba(255, 255, 255, 0.78) 0 3px, transparent 4px),
    radial-gradient(circle at 48% 75%, rgba(255, 255, 255, 0.55) 0 5px, transparent 6px),
    radial-gradient(circle at 70% 68%, rgba(244, 208, 111, 0.48) 0 9px, transparent 10px),
    linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.24) 48%, transparent 58%);
  pointer-events: none;
  opacity: 0.95;
}

.title-box::after {
  content: "";
  position: absolute;
  left: 8%;
  right: 8%;
  bottom: 12px;
  height: 3px;
  border-radius: 999px;
  background: linear-gradient(90deg, transparent, #fff2a8, transparent);
  opacity: 0.95;
}

.title-inner {
  position: relative;
  z-index: 1;
}

.crest {
  width: 88px;
  height: 88px;
  margin: 0 auto 12px;
  border: 4px solid #f4d06f;
  border-radius: 50%;
  background:
    radial-gradient(circle at 30% 22%, #ffffff 0%, #ffffff 15%, transparent 16%),
    radial-gradient(circle at 50% 50%, #ffffff 0%, #bfdbfe 45%, #2563eb 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 43px;
  color: #1e3a8a;
  box-shadow:
    inset -8px -9px 0 rgba(0, 0, 0, 0.16),
    0 5px 0 rgba(5, 18, 42, 0.48),
    0 0 22px rgba(255, 242, 168, 0.58);
}

h1,
h2,
h3,
p,
li {
  overflow-wrap: anywhere;
}

h1 {
  margin: 0;
  font-size: 31px;
  line-height: 1.15;
  letter-spacing: 0.06em;
  color: #fff8d6;
  text-shadow:
    0 2px 0 #0b1d39,
    0 0 12px rgba(244, 208, 111, 0.55);
}

h2 {
  margin: 0 0 8px;
  font-size: 21px;
  line-height: 1.35;
  color: #102a43;
}

h3 {
  margin: 0 0 6px;
  font-size: 17px;
  line-height: 1.4;
  color: #102a43;
}

p {
  margin: 7px 0;
  line-height: 1.62;
}

.subtitle {
  margin-top: 9px;
  font-weight: 900;
  color: #fff2a8;
  text-shadow:
    0 1px 0 #06152c,
    0 0 9px rgba(255, 242, 168, 0.5);
}

.small {
  font-size: 13px;
  color: #52616b;
  line-height: 1.5;
}

.note {
  background:
    linear-gradient(180deg, #f8fbff, #e8f3ff);
  color: #102033;
  border: 2px solid #85b8dc;
  border-radius: 14px;
  padding: 10px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
}

.btn-area {
  margin-top: auto;
  display: grid;
  gap: 9px;
}

button {
  width: 100%;
  min-height: 49px;
  padding: 10px 13px;
  border: 3px solid #071733;
  border-radius: 14px;
  background:
    linear-gradient(180deg, #fff9d4 0%, #f7d467 52%, #d59a2f 100%);
  color: #102033;
  font-size: 16px;
  font-weight: 900;
  line-height: 1.35;
  cursor: pointer;
  box-shadow:
    0 4px 0 #5b3c0f,
    0 10px 16px rgba(0, 0, 0, 0.14),
    inset 0 1px 0 rgba(255,255,255,0.85);
  touch-action: manipulation;
  transition:
    transform 0.08s ease,
    box-shadow 0.08s ease,
    filter 0.12s ease;
}

button:active {
  transform: translateY(2px);
  box-shadow:
    0 2px 0 #5b3c0f,
    0 6px 12px rgba(0, 0, 0, 0.14);
  filter: brightness(0.98);
}

button:disabled {
  opacity: 0.55;
  cursor: not-allowed;
  filter: grayscale(0.35);
}

.sub {
  background:
    linear-gradient(180deg, #f3fbff 0%, #bce6ff 52%, #73afd8 100%);
  box-shadow:
    0 4px 0 #235072,
    0 10px 16px rgba(0, 0, 0, 0.14),
    inset 0 1px 0 rgba(255,255,255,0.85);
}

.danger {
  background:
    linear-gradient(180deg, #ffecec 0%, #ffc3c3 52%, #dc7777 100%);
  box-shadow:
    0 4px 0 #7b2b2b,
    0 10px 16px rgba(0, 0, 0, 0.14),
    inset 0 1px 0 rgba(255,255,255,0.78);
}

.name-form {
  display: grid;
  gap: 10px;
}

.name-label {
  display: block;
  font-size: 13px;
  font-weight: 900;
  color: #fff2a8;
  margin-bottom: 6px;
}

.name-input,
input.name-input {
  width: 100%;
  min-height: 52px;
  padding: 10px 12px;
  border: 3px solid #f4d06f;
  border-radius: 14px;
  background:
    linear-gradient(180deg, #ffffff 0%, #e8f3ff 100%);
  color: #102033;
  font-size: 18px;
  font-weight: 900;
  outline: none;
  box-shadow:
    0 4px 0 rgba(2, 8, 23, 0.45),
    inset 0 2px 4px rgba(0,0,0,0.08);
}

.name-input:focus {
  border-color: #fff2a8;
  box-shadow:
    0 0 0 4px rgba(244, 208, 111, 0.28),
    0 4px 0 rgba(2, 8, 23, 0.45),
    inset 0 2px 4px rgba(0,0,0,0.08);
}

.name-preview {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  min-height: 96px;
  margin: 4px 0;
}

.name-preview .pixel-sprite {
  transform: scale(1.08);
}

.area-button {
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(232, 243, 255, 0.96));
  color: #102033;
  text-align: left;
  display: block;
  border-color: #11294d;
  box-shadow:
    0 4px 0 rgba(5, 18, 42, 0.34),
    0 12px 20px rgba(0, 0, 0, 0.12),
    inset 0 1px 0 rgba(255, 255, 255, 0.95);
}

.area-button.clear,
.clear {
  background:
    linear-gradient(180deg, #f5fff6 0%, #d7f8dd 55%, #9edda8 100%);
}

.area-button.locked,
.locked {
  background:
    linear-gradient(180deg, #d9dee7 0%, #9aa8b9 100%);
  color: #29384a;
  opacity: 0.74;
}

.area-title {
  display: block;
  font-size: 16px;
  margin-bottom: 5px;
  color: #102a43;
}

.area-meta {
  display: block;
  font-size: 12px;
  color: #52616b;
  line-height: 1.46;
  font-weight: 700;
}

.tag {
  display: inline-block;
  border: 2px solid #11294d;
  border-radius: 999px;
  background:
    linear-gradient(180deg, #fffbe0, #f4d06f);
  padding: 4px 9px;
  margin: 2px 2px 2px 0;
  font-size: 12px;
  font-weight: 900;
  color: #1f2937;
  box-shadow:
    0 2px 0 rgba(5, 18, 42, 0.18),
    inset 0 1px 0 rgba(255,255,255,0.9);
}

.battle-field {
  background:
    radial-gradient(circle at 78% 32%, rgba(255, 255, 255, 0.78) 0 10px, transparent 11px),
    radial-gradient(circle at 50% 100%, rgba(255, 255, 255, 0.25) 0%, transparent 38%),
    linear-gradient(180deg, #64c8ff 0%, #83d9ff 44%, #4c9c5a 45%, #60b76c 100%);
  border: 3px solid #071733;
  border-radius: 20px;
  padding: 12px;
  min-height: 282px;
  position: relative;
  overflow: hidden;
  box-shadow:
    inset 0 0 0 2px rgba(255, 255, 255, 0.35),
    0 5px 0 rgba(5, 18, 42, 0.38),
    0 14px 22px rgba(0, 0, 0, 0.16);
}

.battle-field::before {
  content: "";
  position: absolute;
  left: -30px;
  right: -30px;
  bottom: 48px;
  height: 48px;
  background:
    radial-gradient(ellipse at center, rgba(255,255,255,0.32) 0%, rgba(255,255,255,0.12) 42%, transparent 70%);
  pointer-events: none;
}

.status {
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.97), rgba(232, 244, 255, 0.96));
  color: #102033;
  border: 2px solid #071733;
  border-radius: 14px;
  padding: 8px;
  font-size: 13px;
  box-shadow:
    0 3px 0 rgba(5, 18, 42, 0.26),
    inset 0 1px 0 rgba(255,255,255,0.95);
  position: relative;
  z-index: 2;
}

.status strong {
  color: #102a43;
}

.enemy-status {
  width: 64%;
  margin-bottom: 12px;
}

.player-status {
  width: 64%;
  margin-left: auto;
  margin-top: 12px;
}

.sprite-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  min-height: 126px;
  padding: 0 18px;
  position: relative;
  z-index: 1;
}

.monster,
.buddy {
  width: 104px;
  height: 104px;
  border: 3px solid #071733;
  border-radius: 18px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 45px;
  box-shadow:
    inset -9px -10px 0 rgba(0, 0, 0, 0.14),
    0 6px 0 rgba(5, 18, 42, 0.35),
    0 14px 18px rgba(0, 0, 0, 0.16);
  background:
    radial-gradient(circle at 30% 20%, rgba(255,255,255,0.92) 0 14px, transparent 15px),
    linear-gradient(145deg, #ffffff, #f4d06f 55%, #d08a2e);
  image-rendering: pixelated;
}

.buddy {
  border-radius: 18px;
  background:
    radial-gradient(circle at 30% 22%, rgba(255,255,255,0.95) 0 14px, transparent 15px),
    linear-gradient(145deg, #f9fff9, #8ee5a1 55%, #2f9e5d);
  font-size: 43px;
  border-color: #0e4227;
}

.monster.final,
.final {
  background:
    radial-gradient(circle at 30% 20%, rgba(255,255,255,0.76) 0 13px, transparent 14px),
    linear-gradient(145deg, #f4efff 0%, #5d4a9f 48%, #1f123f 100%);
  color: #ffffff;
  border-color: #050816;
}

.boss-aura {
  box-shadow:
    inset -9px -10px 0 rgba(0, 0, 0, 0.16),
    0 0 0 4px rgba(244, 208, 111, 0.35),
    0 0 24px rgba(126, 87, 194, 0.56),
    0 6px 0 rgba(5, 18, 42, 0.38);
}

.pixel-sprite {
  width: 88px;
  height: 88px;
  position: relative;
  display: inline-block;
  flex: 0 0 auto;
  image-rendering: pixelated;
  border-radius: 0;
  filter: drop-shadow(0 6px 0 rgba(5, 18, 42, 0.34));
}

.pixel-sprite::before,
.pixel-sprite::after {
  content: "";
  position: absolute;
  image-rendering: pixelated;
}

.pixel-sprite-img {
  width: 96px;
  height: 96px;
  object-fit: contain;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}


/* 外部画像イラスト用：hero.png / sora.png / enemy.png などを自然に表示 */
.sprite-image-shell {
  width: 112px;
  height: 112px;
  padding: 4px;
  overflow: hidden;
  background:
    radial-gradient(circle at 30% 20%, rgba(255,255,255,0.92) 0 14px, transparent 15px),
    linear-gradient(145deg, #ffffff, #f7e6a3 55%, #d08a2e);
}

.sprite-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  image-rendering: auto;
  filter: drop-shadow(0 5px 4px rgba(5, 18, 42, 0.28));
}

.sprite-img.pixelated {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

.sprite-fallback-mark {
  width: 100%;
  height: 100%;
  align-items: center;
  justify-content: center;
  font-size: 45px;
}

.party-sprites {
  display: flex;
  align-items: center;
  gap: 8px;
}

.hero.sprite-image-shell,
.buddy.sprite-image-shell {
  background:
    radial-gradient(circle at 30% 22%, rgba(255,255,255,0.95) 0 14px, transparent 15px),
    linear-gradient(145deg, #fffdf5, #dbeafe 52%, #7dd3fc 100%);
}

.sprite-hero {
  width: 84px;
  height: 92px;
}

.sprite-hero::before {
  width: 10px;
  height: 10px;
  left: 37px;
  top: 6px;
  background: #f4d06f;
  box-shadow:
    0 10px #f4d06f,
    -10px 10px #f4d06f,
    10px 10px #f4d06f,

    -20px 20px #1f2937,
    -10px 20px #f1c27d,
    0 20px #f1c27d,
    10px 20px #f1c27d,
    20px 20px #1f2937,

    -20px 30px #1f2937,
    -10px 30px #f1c27d,
    0 30px #111827,
    10px 30px #f1c27d,
    20px 30px #1f2937,

    -10px 40px #1e3a8a,
    0 40px #1e3a8a,
    10px 40px #1e3a8a,

    -20px 50px #0f172a,
    -10px 50px #1e3a8a,
    0 50px #f4d06f,
    10px 50px #1e3a8a,
    20px 50px #0f172a,

    -20px 60px #0f172a,
    -10px 60px #1e3a8a,
    0 60px #1e3a8a,
    10px 60px #1e3a8a,
    20px 60px #0f172a,

    -10px 70px #334155,
    0 70px #334155,
    10px 70px #334155,

    -10px 80px #111827,
    10px 80px #111827;
}

.sprite-hero::after {
  width: 10px;
  height: 10px;
  left: 57px;
  top: 38px;
  background: #f4d06f;
  box-shadow:
    10px 0 #f4d06f,
    20px 0 #f4d06f,
    20px 10px #f4d06f,
    20px 20px #f4d06f;
}

.sprite-sora {
  width: 88px;
  height: 88px;
}

.sprite-sora::before {
  width: 10px;
  height: 10px;
  left: 39px;
  top: 8px;
  background: #0f5132;
  box-shadow:
    -10px 0 #2f9e5d,
    10px 0 #2f9e5d,
    -20px 10px #2f9e5d,
    -10px 10px #7ee081,
    0 10px #7ee081,
    10px 10px #7ee081,
    20px 10px #2f9e5d,

    -30px 20px #2f9e5d,
    -20px 20px #7ee081,
    -10px 20px #b7f7b7,
    0 20px #ffffff,
    10px 20px #b7f7b7,
    20px 20px #7ee081,
    30px 20px #2f9e5d,

    -30px 30px #0f5132,
    -20px 30px #7ee081,
    -10px 30px #111827,
    0 30px #ffffff,
    10px 30px #111827,
    20px 30px #7ee081,
    30px 30px #0f5132,

    -20px 40px #0f5132,
    -10px 40px #7ee081,
    0 40px #f4d06f,
    10px 40px #7ee081,
    20px 40px #0f5132,

    -10px 50px #0f5132,
    0 50px #7ee081,
    10px 50px #0f5132,

    -10px 60px #334155,
    10px 60px #334155;
}

.enemy-bat::before,
.enemy-runaway::before,
.enemy-ghost::before,
.enemy-oni::before,
.enemy-ship::before,
.enemy-book::before,
.enemy-final-boss::before {
  width: 10px;
  height: 10px;
  left: 39px;
  top: 12px;
}

.enemy-bat::before {
  background: #111827;
  box-shadow:
    -30px 10px #111827,
    -20px 10px #111827,
    0 10px #4c1d95,
    20px 10px #111827,
    30px 10px #111827,

    -40px 20px #111827,
    -30px 20px #4c1d95,
    -20px 20px #111827,
    -10px 20px #4c1d95,
    0 20px #7c3aed,
    10px 20px #4c1d95,
    20px 20px #111827,
    30px 20px #4c1d95,
    40px 20px #111827,

    -30px 30px #111827,
    -20px 30px #4c1d95,
    -10px 30px #ffffff,
    0 30px #7c3aed,
    10px 30px #ffffff,
    20px 30px #4c1d95,
    30px 30px #111827,

    -10px 40px #4c1d95,
    0 40px #111827,
    10px 40px #4c1d95,

    -10px 50px #111827,
    10px 50px #111827;

const SAFE_AREAS = typeof AREAS !== "undefined" && Array.isArray(AREAS) ? AREAS : [];
const SAFE_QUESTIONS = typeof QUESTIONS !== "undefined" && Array.isArray(QUESTIONS) ? QUESTIONS : [];
const SAFE_BUDDY_LINES = typeof BUDDY_LINES !== "undefined" && BUDDY_LINES ? BUDDY_LINES : (typeof CLOVERBIRD_LINES !== "undefined" && CLOVERBIRD_LINES ? CLOVERBIRD_LINES : {});
const SAFE_TITLE_RULES = typeof TITLE_RULES !== "undefined" && Array.isArray(TITLE_RULES) ? TITLE_RULES : [];
const SAFE_STORY_TEXTS = typeof STORY_TEXTS !== "undefined" && STORY_TEXTS ? STORY_TEXTS : {};
const SAFE_BATTLE_WORDS = typeof BATTLE_WORDS !== "undefined" && BATTLE_WORDS ? BATTLE_WORDS : {};
const SAFE_CHARACTERS = typeof CHARACTERS !== "undefined" && CHARACTERS ? CHARACTERS : {};

let app = null;
let state = defaultState();
let battle = null;
let pendingFinalAreaId = null;

function initGame() {
  app = document.getElementById("app");

  if (!app) {
    alert("ゲーム画面の読み込みに失敗しました。index.html に <div id=\"app\"></div> があるか確認してください。");
    return;
  }

  loadGame();
  showTitle();
}

function defaultState() {
  return {
    playerName: getDefaultHeroName(),
    clearedAreas: [],
    totalAnswers: 0,
    totalCorrect: 0,
    wrongQuestionIds: []
  };
}

function loadGame() {
  try {
    const rawData = localStorage.getItem(SAVE_KEY);

    if (!rawData) {
      state = defaultState();
      return;
    }

    const loaded = JSON.parse(rawData);

    state = {
      playerName: sanitizePlayerName(loaded.playerName || getDefaultHeroName()),
      clearedAreas: Array.isArray(loaded.clearedAreas) ? loaded.clearedAreas : [],
      totalAnswers: Number(loaded.totalAnswers) || 0,
      totalCorrect: Number(loaded.totalCorrect) || 0,
      wrongQuestionIds: Array.isArray(loaded.wrongQuestionIds) ? loaded.wrongQuestionIds : []
    };
  } catch (error) {
    state = defaultState();
  }
}

function saveGame() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(state));
  } catch (error) {
    console.log("保存できませんでした。", error);
  }
}

function hasSave() {
  try {
    return !!localStorage.getItem(SAVE_KEY);
  } catch (error) {
    return false;
  }
}

function resetGame() {
  const ok = confirm("保存データを消して、はじめから遊びますか？");
  if (!ok) return;

  try {
    localStorage.removeItem(SAVE_KEY);
  } catch (error) {
    console.log("保存データの削除に失敗しました。", error);
  }

  state = defaultState();
  battle = null;
  pendingFinalAreaId = null;
  showNameInput();
}

      </div>

      <div class="title-catch-card">
        <h2>迷いを越えて、希望の空へ。</h2>
        <p>心にひそむ“あるあるの迷い”を、教学という「人を励ます知恵」で晴らしていこう。</p>

  });

function savePlayerNameAndStart() {
  const input = document.getElementById("playerNameInput");
  const value = input ? input.value : "";
  state.playerName = sanitizePlayerName(value);
  saveGame();
  showPrologue();
}

function startWithDefaultName() {
  state.playerName = getDefaultHeroName();
  saveGame();
  showPrologue();
}

function continueGame() {
  loadGame();

  if (hasSave()) {
    showAreaSelect();
  } else {
    showNameInput();
  }
}

function showPrologue() {
  const prologue = Array.isArray(SAFE_STORY_TEXTS.prologue) && SAFE_STORY_TEXTS.prologue.length

        "こうして、希望の教学を集める旅が始まった。"

  prologue.forEach(function(text) {
    storyHtml += `<p>${escapeHtml(applyStoryName(text))}</p>`;
  });

  app.innerHTML = `
    <div class="screen">
      <div class="topbar">
        <strong>プロローグ</strong>
        <button onclick="showTitle()">戻る</button>
      </div>

      <div class="box command-window">
        <h2>${escapeHtml(getPlayerName())}の旅立ち</h2>
        ${storyHtml}
      </div>

      <div class="btn-area">
        <button onclick="showAreaSelect()">冒険へ出発</button>
        <button class="sub" onclick="showTitle()">タイトルへ</button>
      </div>
    </div>
  `;
}

function showAreaSelect() {
  loadGame();

  if (!SAFE_AREAS.length) {
    app.innerHTML = `
      <div class="screen">
        <div class="topbar">
          <strong>エラー</strong>
          <button onclick="showTitle()">戻る</button>
        </div>
        <div class="box">
          <h2>エリアデータがありません</h2>
          <p>data.js の AREAS を確認してください。</p>
        </div>
      </div>
    `;
    return;
  }

  const finalUnlocked = isFinalAreaUnlocked();
  let areaButtons = "";

  SAFE_AREAS.forEach(function(area, index) {
    const cleared = state.clearedAreas.includes(area.id);
    const locked = area.final && !finalUnlocked;
    const chapterLabel = area.final ? "最終章" : `第${index + 1}章`;
    const stageCatch = area.stageCatch || area.doubt || area.theme;
    const voiceName = area.voiceLabel || area.boss || "迷いの声";
    const rewardName = area.rewardName || "希望のしるし";

    areaButtons += `
      <button
        class="area-button chapter-card area-${escapeAttr(area.id)} ${cleared ? "clear" : ""} ${locked ? "locked" : ""}"
        ${locked ? "disabled" : ""}
        onclick="${area.final ? `showBeforeFinal('${escapeAttr(area.id)}')` : `startBattle('${escapeAttr(area.id)}')`}"
      >
        <span class="stage-content">
          <span class="chapter-label">${escapeHtml(chapterLabel)}</span>
          <span class="stage-title">${cleared ? "✅ " : ""}${escapeHtml(area.name)}</span>
          <span class="stage-catch">${escapeHtml(stageCatch)}${locked ? " / まだ解放されていません" : ""}</span>
          <span class="stage-row">
            <span class="stage-chip">迷いの声：${escapeHtml(voiceName)}</span>
            <span class="stage-chip">希望のしるし：${escapeHtml(rewardName)}</span>
          </span>
        </span>
      </button>
    `;
  });

  app.innerHTML = `
    <div class="screen area-screen">
      <div class="topbar">
        <strong>冒険マップ</strong>
        <button onclick="showTitle()">タイトル</button>
      </div>

      <div class="area-intro-card">
        <h2>${escapeHtml(getPlayerName())}の旅路</h2>
        <p>章ごとに現れる“迷いの声”を晴らすと、最終章「マヨイの塔」が開かれます。</p>
        <span class="tag">${escapeHtml(getTitleName())}</span>
      </div>

      ${areaButtons}

      <div class="btn-area">
        <button class="sub" onclick="showReviewMode()">復習モード</button>
        <button class="sub" onclick="showStats()">成績を見る</button>
      </div>
    </div>
  `;
}

function showBeforeFinal(areaId) {
  const area = SAFE_AREAS.find(function(item) {
    return item.id === areaId;
  });

  if (!area) {
    showAreaSelect();
    return;
  }

  if (area.final && !isFinalAreaUnlocked()) {
    alert("マヨイの塔は、通常エリアをすべてクリアすると解放されます。");
    showAreaSelect();
    return;
  }

  pendingFinalAreaId = areaId;

  const story = Array.isArray(SAFE_STORY_TEXTS.beforeFinal) && SAFE_STORY_TEXTS.beforeFinal.length
    ? SAFE_STORY_TEXTS.beforeFinal
    : [
        "六つの地に広がっていた迷いは晴れ、希望の武器が集まった。",
        "けれど、マヨイの塔からは、まだ暗い声が響いている。",
        "第六天の魔王が待っている。人間をあきらめさせる、根本の迷いそのものが。",
        "ソラは少し震えながらも、前を向いた。"
      ];

  let storyHtml = "";
  story.forEach(function(text) {
    storyHtml += `<p>${escapeHtml(applyStoryName(text))}</p>`;
  });

  app.innerHTML = `
    <div class="screen">
      <div class="topbar">
        <strong>最終決戦前</strong>
        <button onclick="showAreaSelect()">戻る</button>
      </div>

      <div class="box command-window">
        <h2>${escapeHtml(area.name)}</h2>
        ${storyHtml}
      </div>

      <div class="box">
        <h3>ソラ</h3>
        <p>「${escapeHtml(pickLine("final"))}」</p>
      </div>

      <div class="btn-area">
        <button onclick="startBattle('${escapeAttr(area.id)}')">${escapeHtml(getBattleWord("finalButton", "最終決戦へ"))}</button>
        <button class="sub" onclick="showAreaSelect()">エリア選択へ</button>
      </div>
    </div>
  `;
}

        return item.id === id;
      });

    .filter(function(name) {
      return name !== "";
    });

  app.innerHTML = `

        <button onclick="showTitle()">タイトル</button>
      </div>

        <h2>${escapeHtml(getTitleName())}</h2>

          <strong>${state.totalCorrect}</strong>

}

function showReviewMode() {
  loadGame();

  const wrongQuestions = state.wrongQuestionIds
    .map(function(id) {
      return SAFE_QUESTIONS.find(function(q) {
        return q.id === id;
      });
    })
    .filter(function(q) {
      return !!q;
    });

  if (!wrongQuestions.length) {
    app.innerHTML = `
      <div class="screen">
        <div class="topbar">
          <strong>復習モード</strong>
          <button onclick="showAreaSelect()">戻る</button>
        </div>

        <div class="box command-window">
          <h2>復習する問題はありません</h2>
          <p>ソラ「${escapeHtml(pickLine("review"))}」</p>
          <p>今のところ、間違えた問題はありません。すごいです…！</p>
        </div>

        <div class="btn-area">
          <button onclick="showAreaSelect()">エリア選択へ</button>
          <button class="sub" onclick="showStats()">成績を見る</button>
        </div>
      </div>
    `;
    return;
  }

  app.innerHTML = `
    <div class="screen">
      <div class="topbar">
        <strong>復習モード</strong>
        <button onclick="showAreaSelect()">戻る</button>
      </div>

      <div class="box command-window">
        <h2>間違えた問題に再挑戦</h2>
        <p>ソラ「${escapeHtml(pickLine("review"))}」</p>
        <p>復習対象：${wrongQuestions.length}問</p>
      </div>

      <div class="btn-area">
        <button onclick="startReviewBattle()">復習バトル開始</button>
        <button class="sub" onclick="showAreaSelect()">エリア選択へ</button>
      </div>
    </div>
  `;
}

function showEnding() {

  const ending = Array.isArray(SAFE_STORY_TEXTS.ending) && SAFE_STORY_TEXTS.ending.length

        "ソラは言った。「迷いは何度でも現れるけれど、学び、励まし、行動する心があれば、また立ち上がれます。」",

          <div class="crest">🌈</div>
          <h1>完全クリア！</h1>
          <p class="subtitle">第六天の魔王を倒しました</p>
        </div>
      </div>

      <div class="box">
        <h2>迷いの塔に、光が差した</h2>

      </div>

        ${afterwordHtml}
      </div>

      <div class="box reward-card">
        <h2>称号</h2>
        <p><strong>${escapeHtml(getTitleName())}</strong></p>
        <p class="small">希望の教学を胸に、これからも小さな一歩を。</p>
      </div>

      <div class="btn-area">
        <button onclick="showStats()">成績を見る</button>
        <button class="sub" onclick="showAreaSelect()">エリア選択へ</button>
        <button class="sub" onclick="showTitle()">タイトルへ</button>
      </div>
    </div>
  `;
}

function startBattle(areaId) {
  const area = SAFE_AREAS.find(function(item) {
    return item.id === areaId;
  });

  if (!area) {
    alert("エリア情報が見つかりませんでした。");
    showAreaSelect();
    return;
  }

  if (area.final && !isFinalAreaUnlocked()) {
    alert("マヨイの塔は、通常エリアをすべてクリアすると解放されます。");
    showAreaSelect();
    return;
  }

  const areaQuestions = SAFE_QUESTIONS.filter(function(question) {
    return question.area === areaId;
  });

  if (!areaQuestions.length) {
    app.innerHTML = `
      <div class="screen">
        <div class="topbar">
          <strong>問題なし</strong>
          <button onclick="showAreaSelect()">戻る</button>
        </div>
        <div class="box">
          <h2>このエリアの問題がありません</h2>
          <p>data.js の QUESTIONS を確認してください。</p>
        </div>
      </div>
    `;
    return;
  }

  battle = {
    mode: "area",
    area: area,
    playerHp: PLAYER_MAX_HP,
    enemyHp: Number(area.hp) || 60,
    enemyMaxHp: Number(area.hp) || 60,
    questions: shuffleArray(areaQuestions),
    index: 0,
    currentQuestion: null,
    answered: false,
    selected: null,
    message: `${escapeHtml(area.boss)}「${escapeHtml(area.bossLine || "迷いの声が響いている…。")}」`
  };

  nextQuestion();
}

function startReviewBattle() {
  const reviewQuestions = state.wrongQuestionIds
    .map(function(id) {
      return SAFE_QUESTIONS.find(function(q) {
        return q.id === id;
      });
    })
    .filter(function(q) {
      return !!q;
    });

  if (!reviewQuestions.length) {
    showReviewMode();
    return;
  }

  const reviewArea = {
    id: "review",
    name: "復習の間",
    theme: "間違えた問題の復習",
    boss: "フクシュウノカゲ",
    mark: "📝",
    hp: REVIEW_ENEMY_HP,
    doubt: "忘れかけた学び",
    intro: "一度間違えた問題が、もう一度学ぶチャンスとして現れた。",
    bossLine: "また同じところで迷うかもしれないよ…？",
    clearText: "復習の光が、忘れかけた学びを照らし直した。",
    learn: ["間違いを見直すこと", "覚え直す勇気", "学び続ける姿勢"],
    rewardName: "復習のしおり",
    spriteClass: "enemy-book",
    spritePath: "",
    final: false
  };

  battle = {
    mode: "review",
    area: reviewArea,
    playerHp: PLAYER_MAX_HP,
    enemyHp: REVIEW_ENEMY_HP,
    enemyMaxHp: REVIEW_ENEMY_HP,
    questions: shuffleArray(reviewQuestions),
    index: 0,
    currentQuestion: null,
    answered: false,
    selected: null,
    message: `ソラ「${escapeHtml(pickLine("review"))}」`
  };

  nextQuestion();
}

function renderBattle() {
  if (!battle || !battle.currentQuestion) {
    showAreaSelect();
    return;
  }

  const question = battle.currentQuestion;
  const enemyPercent = Math.max(0, Math.round((battle.enemyHp / battle.enemyMaxHp) * 100));
  const playerPercent = Math.max(0, Math.round((battle.playerHp / PLAYER_MAX_HP) * 100));
  const isFinal = battle.area.final === true;

  let choicesHtml = "";

  question.choices.forEach(function(choice, index) {
    let buttonClass = "choice";

    if (battle.answered) {
      if (index === question.answer) {
        buttonClass += " correct";
      } else if (index === battle.selected) {
        buttonClass += " wrong";
      }
    }

    choicesHtml += `
      <button
        class="${buttonClass}"
        ${battle.answered ? "disabled" : ""}
        onclick="answerQuestion(${index})"
      >
        ${escapeHtml(choice)}
      </button>
    `;
  });

  const heroSprite = renderSprite({
    type: "hero",
    spriteClass: getHeroSpriteClass(),
    spritePath: getHeroSpritePath(),
    fallbackMark: getHeroFallbackMark(),
    name: getHeroDisplayName(),
    imagePixelated: getHeroImagePixelated()
  });

  const buddySprite = renderSprite({
    type: "buddy",
    spriteClass: getBuddySpriteClass(),
    spritePath: getBuddySpritePath(),
    fallbackMark: getBuddyFallbackMark(),
    name: getBuddyDisplayName(),
    imagePixelated: getBuddyImagePixelated()
  });

  const enemySprite = renderSprite({
    type: "monster",
    spriteClass: battle.area.spriteClass || "",
    spritePath: battle.area.spritePath || "",
    fallbackMark: battle.area.mark || "❖",
    name: battle.area.boss || "敵",
    imagePixelated: battle.area.imagePixelated === true,
    final: isFinal
  });

  app.innerHTML = `
    <div class="screen">
      <div class="topbar">
        <strong>${escapeHtml(battle.area.name)}</strong>
        <button onclick="showAreaSelect()">${escapeHtml(getBattleWord("runButton", "にげる"))}</button>
      </div>

      <div class="box">
        <h3>${escapeHtml(battle.area.theme)}</h3>
        <p class="small">${escapeHtml(battle.area.intro || "")}</p>
      </div>

      <div class="battle-field" id="battleField">
        <div class="status enemy-status">
          <strong>迷いの声：${escapeHtml(battle.area.voiceLabel || battle.area.boss)}</strong>
          <div class="hp-wrap">
            <div class="hp" style="width:${enemyPercent}%"></div>
          </div>
          <span class="small hp-label"><span>迷いゲージ</span><span>${battle.enemyHp} / ${battle.enemyMaxHp}</span></span>
        </div>

        <div class="sprite-row">
          <div class="party-sprites">
            ${heroSprite}
            ${buddySprite}
          </div>
          ${enemySprite}
        </div>

        <div class="status player-status">
          <strong>${escapeHtml(getPlayerName())} & ソラ</strong>
          <div class="hp-wrap">
            <div class="hp" style="width:${playerPercent}%"></div>
          </div>
          <span class="small">HP ${battle.playerHp} / ${PLAYER_MAX_HP}</span>
        </div>
      </div>

      <div class="question-box">
        <span class="tag">第${battle.index}問</span>
        <span class="tag">${escapeHtml(typeLabel(question.type))}</span>
        <p class="question">${escapeHtml(question.question)}</p>
      </div>

      <div class="choices">
        ${choicesHtml}
      </div>

      <div class="message">
        ${battle.message}
      </div>

      <div class="btn-area">
        ${battle.answered ? `<button onclick="nextQuestion()">${escapeHtml(getBattleWord("nextButton", "次へ"))}</button>` : ""}
      </div>
    </div>
  `;
}

function answerQuestion(choiceIndex) {
  if (!battle || battle.answered || !battle.currentQuestion) return;

  const question = battle.currentQuestion;
  const correct = choiceIndex === question.answer;

  battle.answered = true;
  battle.selected = choiceIndex;
  state.totalAnswers++;

  if (correct) {
    state.totalCorrect++;
    battle.enemyHp -= CORRECT_DAMAGE;

    if (battle.enemyHp < 0) {
      battle.enemyHp = 0;
    }

    removeWrongQuestion(question.id);

    const lineCategory = battle.area.final ? "final" : "correct";
    const powerText = question.powerText ? `<br><span class="small">${escapeHtml(question.powerText)}</span>` : "";

    battle.message = `
      <strong>${escapeHtml(getBattleWord("correctLabel", "正解！"))}</strong><br>
      ソラ「${escapeHtml(pickLine(lineCategory))}」<br>
      ${escapeHtml(battle.area.voiceLabel || battle.area.boss)}の迷いが${CORRECT_DAMAGE}ほど薄れた！
      ${powerText}<br>
      <span class="small">${escapeHtml(question.explanation)}</span>
    `;

    saveGame();
    renderBattle();
    addTempClass("#battleField", "flash");
  } else {
    battle.playerHp -= WRONG_DAMAGE;

    if (battle.playerHp < 0) {
      battle.playerHp = 0;
    }

    addWrongQuestion(question.id);

    const correctChoice = question.choices[question.answer];

    battle.message = `
      <strong>${escapeHtml(getBattleWord("wrongLabel", "不正解…！"))}</strong><br>
      正解は「${escapeHtml(correctChoice)}」です。<br>
      ソラ「${escapeHtml(pickLine("wrong"))}」<br>
      <span class="small">${escapeHtml(question.explanation)}</span>
    `;

    saveGame();
    renderBattle();
    addTempClass("#battleField", "shake");
  }
}

function nextQuestion() {
  if (!battle) {
    showAreaSelect();
    return;
  }

  if (battle.enemyHp <= 0) {
    showVictory();
    return;
  }

  if (battle.playerHp <= 0) {
    showDefeat();
    return;
  }

  if (battle.index >= battle.questions.length) {
    battle.questions = shuffleArray(battle.questions);
    battle.index = 0;
  }

  battle.currentQuestion = makeQuestionWithShuffledChoices(battle.questions[battle.index]);
  battle.index++;
  battle.answered = false;
  battle.selected = null;

  if (battle.index === 1) {
    battle.message = `${escapeHtml(battle.area.boss)}「${escapeHtml(battle.area.bossLine || "迷いの声が響いている…。")}」`;
  } else if (battle.area.final) {
    battle.message = `ソラ「${escapeHtml(pickLine("final"))}」`;
  } else if (battle.mode === "review") {
    battle.message = `ソラ「${escapeHtml(pickLine("review"))}」`;
  } else {
    battle.message = `ソラ「${escapeHtml(pickLine("start"))}」`;
  }

  renderBattle();
}

function showVictory() {
  if (!battle) {
    showAreaSelect();
    return;
  }

  if (battle.mode === "area" && !state.clearedAreas.includes(battle.area.id)) {
    state.clearedAreas.push(battle.area.id);
  }

  saveGame();

  if (battle.area.final) {
    showEnding();
    return;
  }

  let learnHtml = "";
  const learnItems = Array.isArray(battle.area.learn) ? battle.area.learn : [];

  learnItems.forEach(function(item) {
    learnHtml += `<li>${escapeHtml(item)}</li>`;
  });

  app.innerHTML = `
    <div class="screen victory-glow">
      <div class="title-box">
        <div class="title-inner">
          <div class="crest">✨</div>
          <h1>勝利！</h1>
          <p class="subtitle">${escapeHtml(battle.area.name)}の迷いが晴れました</p>
        </div>
      </div>

      <div class="box command-window">
        <p>ソラ「${escapeHtml(pickLine("victory"))}」</p>
        <p>${escapeHtml(battle.area.clearText || "迷いの霧が晴れていきます。")}</p>
      </div>

      <div class="reward-card">
        <h2>${escapeHtml(getBattleWord("rewardText", "希望の武器を手に入れた！"))}</h2>
        <p><strong>${escapeHtml(battle.area.rewardName || "希望のしるし")}</strong></p>
      </div>

      <div class="box">
        <h2>${escapeHtml(getBattleWord("learnedText", "今回学んだこと"))}</h2>
        <ul class="learn-list">
          ${learnHtml || "<li>学びを力に変えること</li>"}
        </ul>
      </div>

      <div class="btn-area">
        <button onclick="showAreaSelect()">${escapeHtml(getBattleWord("areaSelectButton", "エリア選択へ"))}</button>
        <button class="sub" onclick="showStats()">${escapeHtml(getBattleWord("statsButton", "成績を見る"))}</button>
      </div>
    </div>
  `;
}

function showDefeat() {
  if (!battle) {
    showAreaSelect();
    return;
  }

  app.innerHTML = `
    <div class="screen">
      <div class="title-box">
        <div class="title-inner">
          <div class="crest">🌙</div>
          <h1>敗北…</h1>
          <p class="subtitle">${escapeHtml(getBattleWord("playerDefeated", "ソラは力尽きた…"))}</p>
        </div>
      </div>

      <div class="box command-window">
        <p>ソラ「${escapeHtml(pickLine("defeat"))}」</p>
        <p>迷いは何度でも現れます。でも、何度でも挑戦できます。</p>
      </div>

      <div class="btn-area">
        <button onclick="${battle.mode === "review" ? "startReviewBattle()" : `startBattle('${escapeAttr(battle.area.id)}')`}">${escapeHtml(getBattleWord("retryButton", "もう一度挑戦"))}</button>
        <button class="sub" onclick="showAreaSelect()">${escapeHtml(getBattleWord("areaSelectButton", "エリア選択へ"))}</button>
      </div>
    </div>
  `;
}

function getTitleName() {
  const clearCount = state.clearedAreas.length;
  const rate = state.totalAnswers === 0 ? 0 : state.totalCorrect / state.totalAnswers;

  if (SAFE_TITLE_RULES.length) {
    const sortedRules = SAFE_TITLE_RULES.slice().sort(function(a, b) {
      const clearDiff = (Number(b.minCleared) || 0) - (Number(a.minCleared) || 0);
      if (clearDiff !== 0) return clearDiff;
      return (Number(b.minRate) || 0) - (Number(a.minRate) || 0);
    });

    for (let i = 0; i < sortedRules.length; i++) {
      const rule = sortedRules[i];
      const minCleared = Number(rule.minCleared) || 0;
      const minRate = Number(rule.minRate) || 0;

      if (clearCount >= minCleared && rate >= minRate) {
        return rule.title || "教学の旅人";
      }
    }
  }

  if (state.clearedAreas.includes("tower")) return "ミョウホウ・チャンピオン";
  if (clearCount >= 5) return "広布の勇者";
  if (clearCount >= 3) return "迷いを晴らす冒険者";
  if (clearCount >= 1 && rate >= 0.7) return "希望を学ぶ者";
  return "教学の旅人";
}

function addWrongQuestion(id) {
  if (!state.wrongQuestionIds.includes(id)) {
    state.wrongQuestionIds.push(id);
  }
}

function removeWrongQuestion(id) {
  state.wrongQuestionIds = state.wrongQuestionIds.filter(function(wrongId) {
    return wrongId !== id;
  });
}

function shuffleArray(array) {
  const copied = Array.isArray(array) ? array.slice() : [];

  for (let i = copied.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const temp = copied[i];
    copied[i] = copied[j];
    copied[j] = temp;
  }

  return copied;
}

function makeQuestionWithShuffledChoices(question) {
  if (!question || !Array.isArray(question.choices)) {
    return question;
  }

  const originalChoices = question.choices;
  const originalAnswerIndex = Number(question.answer);

  const choiceObjects = originalChoices.map(function(choice, index) {
    return {
      text: choice,
      isCorrect: index === originalAnswerIndex
    };
  });

  const shuffledChoices = shuffleArray(choiceObjects);

  const newAnswerIndex = shuffledChoices.findIndex(function(choice) {
    return choice.isCorrect;
  });

  return {
    id: question.id,
    area: question.area,
    type: question.type,
    question: question.question,
    choices: shuffledChoices.map(function(choice) {
      return choice.text;
    }),
    answer: newAnswerIndex >= 0 ? newAnswerIndex : originalAnswerIndex,
    explanation: question.explanation,
    powerText: question.powerText
  };
}

function pickLine(category) {
  if (
    SAFE_BUDDY_LINES &&
    Array.isArray(SAFE_BUDDY_LINES[category]) &&
    SAFE_BUDDY_LINES[category].length > 0
  ) {
    const lines = SAFE_BUDDY_LINES[category];
    const index = Math.floor(Math.random() * lines.length);
    return lines[index];
  }

  if (category === "correct") return "その通りです…！ 知ることは、迷いを晴らす一歩です。";
  if (category === "wrong") return "大丈夫です。今覚えれば、それが前進です…！";
  if (category === "victory") return "すごいです…！ また一つ、教学の力が増えましたね。";
  if (category === "defeat") return "えっと…大丈夫です。何度でも挑戦できます。";
  if (category === "final") return "最後まで一緒です。希望の光を、消させません。";
  if (category === "review") return "復習ですね。前より少し強くなれる時間です。";

  return "えっと…大丈夫です。少しずつ覚えていきましょう。";
}

function isFinalAreaUnlocked() {
  const normalAreas = SAFE_AREAS.filter(function(area) {
    return !area.final;
  });

  if (!normalAreas.length) return false;

  return normalAreas.every(function(area) {
    return state.clearedAreas.includes(area.id);
  });
}

function renderSprite(options) {
  const type = options.type || "monster";
  const spriteClass = options.spriteClass || "";
  const spritePath = options.spritePath || "";
  const fallbackMark = options.fallbackMark || "❖";
  const finalClass = options.final ? "final boss-aura" : "";
  const imagePixelated = options.imagePixelated === true;
  const imageClass = imagePixelated ? "sprite-img pixelated" : "sprite-img";
  const altText = options.name || fallbackMark;

  // spritePath に画像URL/相対パスを入れると、外部イラストを優先表示します。
  // 例：assets/images/hero.png / assets/images/sora.png / assets/images/enemies/bat.png
  if (spritePath) {
    return `
      <div class="${type} sprite-image-shell ${finalClass}">
        <img
          class="${imageClass}"
          src="${escapeAttr(spritePath)}"
          alt="${escapeAttr(altText)}"
          loading="lazy"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-flex';"
        >
        <span class="sprite-fallback-mark" style="display:none;">${escapeHtml(fallbackMark)}</span>
      </div>
    `;
  }

  // spritePath が空なら、従来のCSSドット絵を表示します。
  if (spriteClass) {
    return `<div class="${type} pixel-sprite ${spriteClass} ${finalClass}" aria-label="${escapeAttr(fallbackMark)}"></div>`;
  }

  return `<div class="${type} ${finalClass}">${escapeHtml(fallbackMark)}</div>`;
}

function getDefaultHeroName() {
  if (SAFE_CHARACTERS.defaultHeroName) {
    return sanitizePlayerName(SAFE_CHARACTERS.defaultHeroName);
  }
  return "ユウキ";
}

function getPlayerName() {
  return sanitizePlayerName(state.playerName || getDefaultHeroName());
}

function sanitizePlayerName(value) {
  const text = String(value || "")
    .replace(/[<>]/g, "")
    .trim()
    .slice(0, 10);

  return text || "ユウキ";
}

function applyStoryName(text) {
  return String(text || "")
    .replace(/主人公/g, getPlayerName())
    .replace(/ユウキ/g, getPlayerName());
}

function getHeroCharacter() {
  return SAFE_CHARACTERS.hero || {};
}

function getBuddyCharacter() {
  return SAFE_CHARACTERS.buddy || SAFE_CHARACTERS.sora || SAFE_CHARACTERS.cloverbird || {};
}

function getHeroSpriteClass() {
  const hero = getHeroCharacter();
  return hero.spriteClass || "sprite-hero";
}

function getHeroSpritePath() {
  const hero = getHeroCharacter();
  return hero.spritePath || "";
}

function getHeroFallbackMark() {
  const hero = getHeroCharacter();
  return hero.fallbackMark || "🧑";
}

function getHeroDisplayName() {
  const hero = getHeroCharacter();
  return hero.name || "主人公";
}

function getHeroImagePixelated() {
  const hero = getHeroCharacter();
  return hero.imagePixelated === true;
}

function getBuddySpriteClass() {
  const buddy = getBuddyCharacter();
  return buddy.spriteClass || "sprite-sora";
}

function getBuddySpritePath() {
  const buddy = getBuddyCharacter();
  return buddy.spritePath || "";
}

function getBuddyFallbackMark() {
  const buddy = getBuddyCharacter();
  return buddy.fallbackMark || "🦅";
}

function getBuddyDisplayName() {
  const buddy = getBuddyCharacter();
  return buddy.name || "若鷲・ソラ";
}

function getBuddyImagePixelated() {
  const buddy = getBuddyCharacter();
  return buddy.imagePixelated === true;
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function escapeAttr(value) {
  return escapeHtml(value);
}

function addTempClass(selector, className) {
  setTimeout(function() {
    const element = document.querySelector(selector);
    if (!element) return;

    element.classList.add(className);

    setTimeout(function() {
      element.classList.remove(className);
    }, 280);
  }, 20);
}

function getBattleWord(key, fallback) {
  if (SAFE_BATTLE_WORDS && typeof SAFE_BATTLE_WORDS[key] === "string") {
    return SAFE_BATTLE_WORDS[key];
  }

  return fallback;
}

function typeLabel(type) {
  const labels = {
    year: "年号",
    term: "用語",
    meaning: "意味",
    practice: "実践",
    life: "生活"
  };

  return labels[type] || "問題";
}

window.initGame = initGame;
window.defaultState = defaultState;
window.loadGame = loadGame;
window.saveGame = saveGame;
window.hasSave = hasSave;
window.resetGame = resetGame;

window.showTitle = showTitle;
window.showNameInput = showNameInput;
window.savePlayerNameAndStart = savePlayerNameAndStart;
window.startWithDefaultName = startWithDefaultName;
window.continueGame = continueGame;
window.showPrologue = showPrologue;
window.showAreaSelect = showAreaSelect;
window.showBeforeFinal = showBeforeFinal;
window.showStats = showStats;
window.showReviewMode = showReviewMode;
window.showEnding = showEnding;

window.startBattle = startBattle;
window.startReviewBattle = startReviewBattle;
window.renderBattle = renderBattle;
window.answerQuestion = answerQuestion;
window.nextQuestion = nextQuestion;
window.showVictory = showVictory;
window.showDefeat = showDefeat;

window.getTitleName = getTitleName;
window.addWrongQuestion = addWrongQuestion;
window.removeWrongQuestion = removeWrongQuestion;
window.shuffleArray = shuffleArray;
window.makeQuestionWithShuffledChoices = makeQuestionWithShuffledChoices;
window.pickLine = pickLine;
window.isFinalAreaUnlocked = isFinalAreaUnlocked;
window.escapeHtml = escapeHtml;
window.escapeAttr = escapeAttr;
window.addTempClass = addTempClass;

document.addEventListener("DOMContentLoaded", function() {
  initGame();
});

  </script>
